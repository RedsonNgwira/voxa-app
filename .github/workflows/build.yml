name: Build Release AAB

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/voxa-release.jks

      - name: Create key.properties
        run: |
          printf 'storePassword=${{ secrets.KEY_STORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=voxa-release.jks\n' > android/key.properties

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Build universal APK
        run: flutter build apk --release

      - name: Build split APKs (per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs for clarity
        run: |
          cd build/app/outputs/flutter-apk
          cp app-release.apk voxa-universal.apk
          cp app-arm64-v8a-release.apk voxa-arm64-v8a.apk
          cp app-armeabi-v7a-release.apk voxa-armeabi-v7a.apk
          cp app-x86_64-release.apk voxa-x86_64.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxa-release.aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voxa-apks
          path: |
            build/app/outputs/flutter-apk/voxa-universal.apk
            build/app/outputs/flutter-apk/voxa-arm64-v8a.apk
            build/app/outputs/flutter-apk/voxa-armeabi-v7a.apk
            build/app/outputs/flutter-apk/voxa-x86_64.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASES_TOKEN }}
          repository: RedsonNgwira/voxa-app-releases
          tag_name: v1.0.${{ github.run_number }}
          name: Voxa v1.0.${{ github.run_number }}
          body: |
            **APK downloads:**
            - `voxa-arm64-v8a.apk` — most modern phones (~half the size)
            - `voxa-armeabi-v7a.apk` — older 32-bit phones
            - `voxa-x86_64.apk` — emulators
            - `voxa-universal.apk` — works on all devices (largest)
          files: |
            build/app/outputs/flutter-apk/voxa-universal.apk
            build/app/outputs/flutter-apk/voxa-arm64-v8a.apk
            build/app/outputs/flutter-apk/voxa-armeabi-v7a.apk
            build/app/outputs/flutter-apk/voxa-x86_64.apk
